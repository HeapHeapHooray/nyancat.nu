<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nyancat.nu</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #003366;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        
        .banner {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        
        p {
            margin-top: 20px;
            font-size: clamp(1rem, 3vw, 1.2rem);
        }
        
        .links-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            max-width: 800px;
            width: 100%;
        }
        
        .link-button {
            color: white;
            font-weight: bold;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            flex: 1 1 200px;
            min-width: 150px;
        }
        
        .link-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }
        
        .link-converter {
            background-color: #ff0099;
            border: 2px solid #ff0099;
        }
        
        .link-converter:hover {
            background-color: #ff33bb;
        }
        
        .link-x-downloader {
            background-color: #ffcc00;
            border: 2px solid #ffcc00;
            color: #003366;
        }
        
        .link-x-downloader:hover {
            background-color: #ffdd33;
        }
        
        .link-bg-remover {
            background-color: #00ffcc;
            border: 2px solid #00ffcc;
            color: #003366;
        }
        
        .link-bg-remover:hover {
            background-color: #33ffdd;
        }
        
        .link-video-compressor {
            background-color: #9933ff;
            border: 2px solid #9933ff;
        }
        
        .link-video-compressor:hover {
            background-color: #aa55ff;
        }
        
        .link-notepad {
            background-color: #00cc66;
            border: 2px solid #00cc66;
        }
        
        .link-notepad:hover {
            background-color: #00dd77;
        }
        
        .link-video-slicer {
            background-color: #ff6600;
            border: 2px solid #ff6600;
        }
        
        .link-video-slicer:hover {
            background-color: #ff7722;
        }
        
        .link-audio-to-video {
            background-color: #cc3399;
            border: 2px solid #cc3399;
        }
        
        .link-audio-to-video:hover {
            background-color: #dd44aa;
        }
        
        .github-link {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            transition: background-color 0.3s, transform 0.2s;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .github-link:hover {
            background-color: rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        
        .github-logo {
            width: 24px;
            height: 24px;
        }
        
        @media (max-width: 768px) {
            .github-link {
                position: static;
                margin-bottom: 20px;
                display: inline-flex;
            }
        }
    </style>
</head>
<body>
    <a href="https://github.com/HeapHeapHooray/nyancat.nu" target="_blank" rel="noopener noreferrer" class="github-link">
        <svg class="github-logo" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span>Free & Open Source</span>
    </a>
    <h1>Welcome to nyancat.nu!</h1>
    <img src="https://media.giphy.com/media/sIIhZliB2McAo/giphy.gif" alt="Nyan Cat Banner" class="banner">
    <p>Enjoy the rainbows and space vibes.</p>
    <div class="links-container">
        <a href="{% url 'converter' %}" class="link-button link-converter">File Converter</a>
        <a href="{% url 'video_compressor' %}" class="link-button link-video-compressor">Video Compressor/Resizer</a>
        <a href="{% url 'video_slicer' %}" class="link-button link-video-slicer">Audio/Video Slicer</a>
        <a href="{% url 'audio_to_video' %}" class="link-button link-audio-to-video">Audio to Video</a>
        <a href="{% url 'x_downloader' %}" class="link-button link-x-downloader">X Video Downloader</a>
        <a href="{% url 'bg_remover' %}" class="link-button link-bg-remover">Background Remover</a>
        <a href="{% url 'notepad' %}" class="link-button link-notepad">Notepad</a>
    </div>
</body>
</html>
