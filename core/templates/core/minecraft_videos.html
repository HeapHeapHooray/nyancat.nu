<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Video Recordings - nyancat.nu</title>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'core/images/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'core/images/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'core/images/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'core/images/apple-touch-icon-bg.png' %}">
    <link rel="manifest" href="{% static 'core/site.webmanifest' %}">
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #003366;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .jump-to-month {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .jump-to-month h2 {
            font-size: 1rem;
            margin-top: 0;
            margin-bottom: 10px;
            color: #00ffcc;
        }

        .month-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .month-link {
            font-size: 0.8rem;
            background: rgba(0, 153, 255, 0.3);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .month-link:hover {
            background: rgba(0, 153, 255, 0.6);
        }

        .month-link.active {
            background: #0099ff;
            font-weight: bold;
        }

        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .calendar-controls button {
            background: #0099ff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        .calendar-controls button:hover {
            background: #33aaff;
        }

        #current-month-year {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 5px;
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            table-layout: fixed;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .calendar-day {
            min-height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
            overflow: hidden;
        }

        .calendar-day.today {
            background: rgba(0, 153, 255, 0.2);
            border: 1px solid #0099ff;
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .video-links {
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow-y: auto;
            max-height: 70px;
        }

        .video-link {
            font-size: 0.65rem;
            background: #00cc66;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            width: 100%;
        }

        .video-link:hover {
            background: #00dd77;
        }

        .back-links {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .back-link {
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .calendar-day {
                min-height: 60px;
            }
            .day-number {
                font-size: 0.7rem;
            }
            .video-link {
                font-size: 0.55rem;
                padding: 1px 2px;
            }
            .calendar-day-header {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <h1>Minecraft Video Recordings</h1>

    <div class="jump-to-month">
        <h2>Jump to Month:</h2>
        <div class="month-links" id="jump-month-links">
            <!-- Populated by JS -->
        </div>
    </div>

    <div class="calendar-controls">
        <button id="prev-month">&lt; Prev</button>
        <div id="current-month-year">Month Year</div>
        <button id="next-month">Next &gt;</button>
    </div>

    <div class="calendar-grid" id="calendar-grid">
        <!-- Calendar will be generated by JS -->
    </div>

    <div class="back-links">
        <a href="{% url 'minecraft_vault' %}" class="back-link">← Back to Vault</a>
        <a href="{% url 'index' %}" class="back-link">Back to Home</a>
    </div>

    <script id="videos-data" type="application/json">
        {{ videos_json|safe }}
    </script>

    <script>
        const videos = JSON.parse(document.getElementById('videos-data').textContent);
        const calendarGrid = document.getElementById('calendar-grid');
        const monthYearDisplay = document.getElementById('current-month-year');
        const prevMonthBtn = document.getElementById('prev-month');
        const nextMonthBtn = document.getElementById('next-month');
        const jumpMonthLinks = document.getElementById('jump-month-links');

        const monthNames = ["January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        let currentDate = new Date();
        
        // Find available months for jump links
        const availableMonths = [];
        videos.forEach(v => {
            const d = new Date(v.recorded_unix_time * 1000);
            const key = `${d.getFullYear()}-${d.getMonth()}`;
            if (!availableMonths.find(m => m.key === key)) {
                availableMonths.push({
                    key: key,
                    year: d.getFullYear(),
                    month: d.getMonth(),
                    label: `${monthNames[d.getMonth()].substring(0, 3)} ${d.getFullYear()}`
                });
            }
        });
        
        // Sort months ascending for the jump links
        availableMonths.sort((a, b) => {
            if (a.year !== b.year) return a.year - b.year;
            return a.month - b.month;
        });

        function populateJumpLinks() {
            jumpMonthLinks.innerHTML = '';
            availableMonths.forEach(m => {
                const link = document.createElement('a');
                link.href = '#';
                link.className = 'month-link';
                if (currentDate.getFullYear() === m.year && currentDate.getMonth() === m.month) {
                    link.classList.add('active');
                }
                link.textContent = m.label;
                link.onclick = (e) => {
                    e.preventDefault();
                    currentDate = new Date(m.year, m.month, 1);
                    renderCalendar(currentDate);
                    populateJumpLinks();
                };
                jumpMonthLinks.appendChild(link);
            });
        }

        // Initialize to latest video date
        if (videos.length > 0) {
            videos.sort((a, b) => b.recorded_unix_time - a.recorded_unix_time);
            currentDate = new Date(videos[0].recorded_unix_time * 1000);
        }

        function formatVideoTitle(name) {
            // Clean up titles: "Copy of Minecraft 1.13.2 2019-12-21 22-04-10"
            let title = name.replace('Copy of ', '').replace('.mp4', '');
            
            // Extract version if present
            const versionMatch = title.match(/(\d+\.\d+(\.\d+)?)/);
            const version = versionMatch ? versionMatch[1] : '';
            
            // Extract time if present
            const timeMatch = title.match(/(\d{2}-\d{2}-\d{2})$/);
            let time = timeMatch ? timeMatch[1].replace(/-/g, ':') : '';
            if (time.length > 5) time = time.substring(0, 5); // Just HH:MM
            
            if (version && time) return `${version} @ ${time}`;
            if (version) return version;
            if (time) return time;
            
            return title.substring(0, 15);
        }

        function renderCalendar(date) {
            calendarGrid.innerHTML = '';
            
            const year = date.getFullYear();
            const month = date.getMonth();
            
            monthYearDisplay.textContent = `${monthNames[month]} ${year}`;
            
            // Days header
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-day-header';
                header.textContent = day;
                calendarGrid.appendChild(header);
            });
            
            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Previous month's trailing days
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = firstDayOfMonth - 1; i >= 0; i--) {
                const day = document.createElement('div');
                day.className = 'calendar-day other-month';
                day.innerHTML = `<div class="day-number">${prevMonthLastDay - i}</div>`;
                calendarGrid.appendChild(day);
            }
            
            // Current month's days
            const today = new Date();
            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                day.className = 'calendar-day';
                if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
                    day.classList.add('today');
                }
                
                day.innerHTML = `<div class="day-number">${i}</div>`;
                
                // Add videos for this day
                const dayVideos = videos.filter(v => {
                    const vDate = new Date(v.recorded_unix_time * 1000);
                    return vDate.getFullYear() === year && vDate.getMonth() === month && vDate.getDate() === i;
                });
                
                if (dayVideos.length > 0) {
                    const videoContainer = document.createElement('div');
                    videoContainer.className = 'video-links';
                    dayVideos.forEach(v => {
                        const link = document.createElement('a');
                        link.href = v.link;
                        link.target = '_blank';
                        link.className = 'video-link';
                        link.title = v.name.replace('Copy of ', '');
                        link.textContent = formatVideoTitle(v.name);
                        videoContainer.appendChild(link);
                    });
                    day.appendChild(videoContainer);
                }
                
                calendarGrid.appendChild(day);
            }
            
            // Next month's leading days
            const totalCells = firstDayOfMonth + daysInMonth;
            const rowsNeeded = Math.ceil(totalCells / 7);
            const totalGridCells = rowsNeeded * 7;
            const leadingDays = totalGridCells - totalCells;
            
            for (let i = 1; i <= leadingDays; i++) {
                const day = document.createElement('div');
                day.className = 'calendar-day other-month';
                day.innerHTML = `<div class="day-number">${i}</div>`;
                calendarGrid.appendChild(day);
            }
        }

        prevMonthBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar(currentDate);
            populateJumpLinks();
        });

        nextMonthBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar(currentDate);
            populateJumpLinks();
        });

        populateJumpLinks();
        renderCalendar(currentDate);
    </script>
</body>
</html>
