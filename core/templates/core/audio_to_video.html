<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio to Video - nyancat.nu</title>
    <style>
        body {
            background-color: #003366;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 90%;
        }
        input, select, button {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }
        button {
            background-color: #ff0099;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            width: 100%;
        }
        button:hover { background-color: #ff33bb; }
        button:disabled { background-color: #666; cursor: not-allowed; }
        #status { margin-top: 20px; font-style: italic; color: #00ccff; }
        #downloadLink {
            display: none;
            margin-top: 20px;
            color: #00ff00;
            text-decoration: underline;
            font-weight: bold;
        }
        .back-link { margin-top: 30px; color: #ccc; text-decoration: none; }
        .upload-section {
            margin: 20px 0;
            text-align: left;
        }
        .upload-section label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
            font-size: 0.9rem;
        }
        .preview-box {
            margin: 15px 0;
            min-height: 50px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 5px;
            object-fit: contain;
        }
        .preview-box audio {
            width: 100%;
            margin-top: 10px;
        }
        .info-text {
            font-size: 0.85rem;
            color: #999;
            margin-top: 5px;
        }
        #resultPreview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .section-title {
            font-size: 1.2rem;
            color: #00ccff;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .history-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .history-preview {
            width: 120px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0,0,0,0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        .history-preview video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .history-info {
            flex: 1;
        }
        .history-download {
            text-decoration: none;
            font-size: 1.5rem;
            color: #00ff00;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            body {
                padding: 15px;
                justify-content: flex-start;
                padding-top: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }
            
            .container {
                padding: 20px;
                width: 95%;
            }
            
            .section-title {
                font-size: 1rem;
            }
            
            .history-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .history-preview {
                width: 100%;
                height: 150px;
            }
            
            .history-info {
                width: 100%;
            }
            
            .history-download {
                align-self: center;
                font-size: 2rem;
                padding: 10px;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .container {
                padding: 15px;
            }
            
            input, select, button {
                font-size: 0.9rem;
                padding: 8px;
            }
            
            .info-text {
                font-size: 0.8rem;
            }
            
            .history-item {
                font-size: 0.85rem;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <h1>Audio to Video</h1>
    <div class="container">
        <p style="font-size: 0.9rem; color: #ccc;">Create a video from a static image and audio file</p>
        
        <div class="upload-section">
            <label>Select Image:</label>
            <input type="file" id="imageInput" accept="image/*">
            <div class="preview-box" id="imagePreviewBox" style="display: none;">
                <img id="imagePreview" alt="Image preview">
            </div>
            <div id="imageInfo" class="info-text"></div>
        </div>

        <div class="upload-section">
            <label>Select Audio:</label>
            <input type="file" id="audioInput" accept="audio/*">
            <div class="preview-box" id="audioPreviewBox" style="display: none;">
                <audio id="audioPreview" controls></audio>
            </div>
            <div id="audioInfo" class="info-text"></div>
        </div>

        <button id="createBtn" disabled>Create Video</button>
        <div id="status">Loading FFmpeg core...</div>
        <a id="downloadLink" href="#" download>Download Video</a>

        <div class="preview-box" id="resultBox" style="display: none;">
            <div class="section-title">Result Preview</div>
            <video id="resultPreview" controls></video>
        </div>
    </div>

    <div class="container" id="historyContainer" style="margin-top: 20px; display: none;">
        <h2 style="font-size: 1.5rem; margin-bottom: 15px;">Creation History</h2>
        <div id="historyList" style="text-align: left; max-height: 300px; overflow-y: auto; padding-right: 5px;">
            <!-- History items will be added here -->
        </div>
        <button id="clearHistoryBtn" style="background-color: #444; margin-top: 15px; font-size: 0.8rem; padding: 5px 10px; width: auto;">Clear History</button>
    </div>

    <a href="{% url 'index' %}" class="back-link">&larr; Back to Home</a>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
        });

        const imageInput = document.getElementById('imageInput');
        const audioInput = document.getElementById('audioInput');
        const imagePreviewBox = document.getElementById('imagePreviewBox');
        const audioPreviewBox = document.getElementById('audioPreviewBox');
        const imagePreview = document.getElementById('imagePreview');
        const audioPreview = document.getElementById('audioPreview');
        const imageInfo = document.getElementById('imageInfo');
        const audioInfo = document.getElementById('audioInfo');
        const createBtn = document.getElementById('createBtn');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');
        const resultBox = document.getElementById('resultBox');
        const resultPreview = document.getElementById('resultPreview');
        const historyContainer = document.getElementById('historyContainer');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let currentImage = null;
        let currentAudio = null;
        let audioDuration = 0;

        async function load() {
            try {
                status.innerText = 'Loading FFmpeg core...';
                await ffmpeg.load();
                status.innerText = 'Ready! Please select an image and audio file.';
                imageInput.disabled = false;
                audioInput.disabled = false;
            } catch (error) {
                status.innerText = 'Error loading FFmpeg: ' + error.message;
                console.error(error);
            }
        }

        load();

        const loadHistory = async () => {
            const history = JSON.parse(localStorage.getItem('audioToVideoHistory') || '[]');
            if (history.length === 0) {
                historyContainer.style.display = 'none';
                return;
            }
            historyContainer.style.display = 'block';
            historyList.innerHTML = '';
            
            // Show latest first
            for (const item of [...history].reverse()) {
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const date = new Date(item.timestamp).toLocaleString();
                
                const previewDiv = document.createElement('div');
                previewDiv.className = 'history-preview';

                try {
                    const blob = await idbKeyval.get(item.id);
                    if (blob) {
                        const url = URL.createObjectURL(blob);
                        previewDiv.innerHTML = `<video src="${url}" controls preload="metadata"></video>`;
                    } else {
                        previewDiv.innerHTML = `<span style="color: #999; font-size: 0.7rem;">Expired</span>`;
                    }
                } catch (e) {
                    console.error("Preview load error", e);
                    previewDiv.innerHTML = `<span style="color: #999; font-size: 0.7rem;">Error</span>`;
                }

                const infoDiv = document.createElement('div');
                infoDiv.className = 'history-info';
                infoDiv.innerHTML = `
                    <div style="font-weight: bold; color: #9933ff;">${item.fileName}</div>
                    <div style="color: #ccc; font-size: 0.8rem;">Image: ${item.imageName}</div>
                    <div style="color: #ccc; font-size: 0.8rem;">Audio: ${item.audioName}</div>
                    <div style="color: #666; font-size: 0.7rem;">${date}</div>
                `;
                
                div.appendChild(previewDiv);
                div.appendChild(infoDiv);

                // Download button from history
                const dlBtn = document.createElement('a');
                dlBtn.href = '#';
                dlBtn.innerHTML = '&#11015;';
                dlBtn.className = 'history-download';
                dlBtn.title = 'Download';
                dlBtn.onclick = async (e) => {
                    e.preventDefault();
                    const b = await idbKeyval.get(item.id);
                    if (b) {
                        const dlUrl = URL.createObjectURL(b);
                        const a = document.createElement('a');
                        a.href = dlUrl;
                        a.download = item.fileName;
                        a.click();
                        URL.revokeObjectURL(dlUrl);
                    } else {
                        alert('File data is no longer available locally.');
                    }
                };
                div.appendChild(dlBtn);

                historyList.appendChild(div);
            }
        };

        const addToHistory = async (imageName, audioName, fileName, blob) => {
            const history = JSON.parse(localStorage.getItem('audioToVideoHistory') || '[]');
            const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            
            history.push({
                id,
                imageName,
                audioName,
                fileName,
                timestamp: new Date().toISOString()
            });
            
            // Keep only last 50 videos
            if (history.length > 50) {
                const removed = history.shift();
                try { await idbKeyval.del(removed.id); } catch(e) {}
            }
            
            localStorage.setItem('audioToVideoHistory', JSON.stringify(history));
            try { await idbKeyval.set(id, blob); } catch(e) { console.error('Failed to save to IDB', e); }
            
            loadHistory();
        };

        clearHistoryBtn.addEventListener('click', async () => {
            if (confirm('Clear all creation history?')) {
                localStorage.removeItem('audioToVideoHistory');
                try { await idbKeyval.clear(); } catch(e) {}
                loadHistory();
            }
        });

        // Load history on page load
        loadHistory();

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            currentImage = file;
            const url = URL.createObjectURL(file);
            
            imagePreview.src = url;
            imagePreviewBox.style.display = 'block';
            imageInfo.innerHTML = `<strong>File:</strong> ${file.name}<br><strong>Size:</strong> ${formatBytes(file.size)}`;
            
            checkReadyToCreate();
        });

        audioInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            currentAudio = file;
            const url = URL.createObjectURL(file);
            
            audioPreview.src = url;
            audioPreviewBox.style.display = 'block';
            
            audioPreview.onloadedmetadata = () => {
                audioDuration = audioPreview.duration;
                const minutes = Math.floor(audioDuration / 60);
                const seconds = Math.floor(audioDuration % 60);
                audioInfo.innerHTML = `<strong>File:</strong> ${file.name}<br>
                                      <strong>Size:</strong> ${formatBytes(file.size)}<br>
                                      <strong>Duration:</strong> ${minutes}:${seconds.toString().padStart(2, '0')}`;
            };
            
            checkReadyToCreate();
        });

        function checkReadyToCreate() {
            if (currentImage && currentAudio) {
                createBtn.disabled = false;
            }
        }

        createBtn.addEventListener('click', async () => {
            if (!currentImage || !currentAudio) {
                alert('Please select both an image and audio file.');
                return;
            }

            try {
                createBtn.disabled = true;
                status.innerText = 'Processing... This may take a while.';
                downloadLink.style.display = 'none';
                resultBox.style.display = 'none';

                const imageExt = currentImage.name.split('.').pop();
                const audioExt = currentAudio.name.split('.').pop();
                const imageName = 'input.' + imageExt;
                const audioName = 'audio.' + audioExt;
                const outputName = 'output.mp4';

                // Write files to FFmpeg virtual filesystem
                ffmpeg.FS('writeFile', imageName, await fetchFile(currentImage));
                ffmpeg.FS('writeFile', audioName, await fetchFile(currentAudio));

                // Build FFmpeg command
                // Use -loop 1 to loop the image, -shortest to match audio duration
                const args = [
                    '-loop', '1',
                    '-framerate', '1',
                    '-i', imageName,
                    '-i', audioName,
                    '-c:v', 'libx264',
                    '-tune', 'stillimage',
                    '-c:a', 'aac',
                    '-b:a', '192k',
                    '-pix_fmt', 'yuv420p',
                    '-vf', 'scale=trunc(iw/2)*2:trunc(ih/2)*2',
                    '-shortest',
                    '-fflags', '+shortest',
                    '-max_interleave_delta', '100M',
                    outputName
                ];

                // Run FFmpeg
                await ffmpeg.run(...args);

                // Read output file
                const data = ffmpeg.FS('readFile', outputName);
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);

                // Update download link
                const imageBaseName = currentImage.name.substring(0, currentImage.name.lastIndexOf('.'));
                const finalFileName = `${imageBaseName}_video.mp4`;
                downloadLink.href = url;
                downloadLink.download = finalFileName;
                downloadLink.innerText = 'Download ' + finalFileName;
                downloadLink.style.display = 'block';

                // Show result preview
                resultBox.style.display = 'block';
                resultPreview.src = url;

                status.innerText = 'Video created successfully!';
                
                // Add to history
                await addToHistory(
                    currentImage.name,
                    currentAudio.name,
                    finalFileName,
                    blob
                );
                
                // Clean up FFmpeg virtual filesystem
                try {
                    ffmpeg.FS('unlink', imageName);
                    ffmpeg.FS('unlink', audioName);
                    ffmpeg.FS('unlink', outputName);
                } catch (e) {
                    console.log('Cleanup error (non-critical):', e);
                }

            } catch (error) {
                status.innerText = 'Error: ' + error.message;
                console.error(error);
            } finally {
                createBtn.disabled = false;
            }
        });

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
</body>
</html>
