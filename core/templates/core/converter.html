<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Converter - nyancat.nu</title>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'core/images/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'core/images/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'core/images/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'core/images/apple-touch-icon-bg.png' %}">
    <link rel="manifest" href="{% static 'core/site.webmanifest' %}">
    <meta name="theme-color" content="#003366">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body {
            background-color: #003366;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        input, select, button {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }
        button {
            background-color: #ff0099;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #ff33bb; }
        button:disabled { background-color: #666; cursor: not-allowed; }
        #status { margin-top: 20px; font-style: italic; color: #00ccff; }
        #downloadLink {
            display: none;
            margin-top: 20px;
            color: #00ff00;
            text-decoration: underline;
            font-weight: bold;
        }
        .back-link { margin-top: 30px; color: #ccc; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Browser File Converter</h1>
    <div class="container">
        <p>Convert any media file in your browser!</p>
        <div style="text-align: left; margin-bottom: 15px;">
            <label for="fileInput" style="display: block; margin-bottom: 5px;">Source File:</label>
            <input type="file" id="fileInput">
        </div>
        <div id="previewContainer" style="margin-bottom: 20px; display: none;">
            <p style="font-size: 0.9rem; color: #ccc;">File Preview:</p>
            <div id="previewBox" style="max-width: 100%; border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 5px;"></div>
        </div>
        <div style="text-align: left; margin-bottom: 15px;">
            <label for="formatSelect" style="display: block; margin-bottom: 5px;">Convert to:</label>
            <select id="formatSelect">
                <option value="mp3">Audio: MP3</option>
                <option value="wav">Audio: WAV</option>
                <option value="aac">Audio: AAC</option>
                <option value="m4a">Audio: M4A</option>
                <option value="mp4">Video: MP4</option>
                <option value="avi">Video: AVI</option>
                <option value="mkv">Video: MKV</option>
                <option value="mov">Video: MOV</option>
                <option value="gif">Image: GIF (animated)</option>
                <option value="png">Image: PNG</option>
                <option value="jpg">Image: JPG</option>
                <option value="webp">Image: WEBP</option>
                <option value="bmp">Image: BMP</option>
                <option value="tiff">Image: TIFF</option>
                <option value="other">Other...</option>
            </select>
        </div>
        <div id="customFormatContainer" style="text-align: left; margin-bottom: 15px; display: none;">
            <label for="formatInput" style="display: block; margin-bottom: 5px;">Specify extension:</label>
            <input type="text" id="formatInput" placeholder="e.g. flac">
        </div>
        <button id="convertBtn" disabled>Loading FFmpeg...</button>
        <div id="status">Initializing...</div>
        <a id="downloadLink" href="#">Download Converted File</a>
    </div>

    <div class="container" id="historyContainer" style="margin-top: 20px; display: none;">
        <h2 style="font-size: 1.5rem; margin-bottom: 15px;">Conversion History</h2>
        <div id="historyList" style="text-align: left; max-height: 300px; overflow-y: auto; padding-right: 5px;">
            <!-- History items will be added here -->
        </div>
        <button id="clearHistoryBtn" style="background-color: #444; margin-top: 15px; font-size: 0.8rem; padding: 5px 10px; width: auto;">Clear History</button>
    </div>

    <a href="{% url 'index' %}" class="back-link">&larr; Back to Home</a>

    <!-- Load ffmpeg.wasm 0.11.6 from CDN (Classic stable version) -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
        });

        const convertBtn = document.getElementById('convertBtn');
        const fileInput = document.getElementById('fileInput');
        const formatSelect = document.getElementById('formatSelect');
        const formatInput = document.getElementById('formatInput');
        const customFormatContainer = document.getElementById('customFormatContainer');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');
        const previewContainer = document.getElementById('previewContainer');
        const previewBox = document.getElementById('previewBox');
        const historyContainer = document.getElementById('historyContainer');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        const getMimeType = (ext) => {
            const types = {
                mp3: 'audio/mpeg', wav: 'audio/wav', aac: 'audio/aac', m4a: 'audio/mp4',
                mp4: 'video/mp4', avi: 'video/x-msvideo', mkv: 'video/x-matroska', mov: 'video/quicktime',
                gif: 'image/gif', png: 'image/png', jpg: 'image/jpeg', webp: 'image/webp', bmp: 'image/bmp', tiff: 'image/tiff'
            };
            return types[ext] || 'application/octet-stream';
        };

        const loadHistory = async () => {
            const history = JSON.parse(localStorage.getItem('conversionHistory') || '[]');
            if (history.length === 0) {
                historyContainer.style.display = 'none';
                return;
            }
            historyContainer.style.display = 'block';
            historyList.innerHTML = '';
            
            // Show latest first
            for (const item of [...history].reverse()) {
                const div = document.createElement('div');
                div.style.padding = '10px';
                div.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
                div.style.fontSize = '0.9rem';
                div.style.display = 'flex';
                div.style.alignItems = 'center';
                div.style.gap = '15px';
                
                const date = new Date(item.timestamp).toLocaleString();
                
                const previewDiv = document.createElement('div');
                previewDiv.style.width = '100px';
                previewDiv.style.height = '60px';
                previewDiv.style.display = 'flex';
                previewDiv.style.alignItems = 'center';
                previewDiv.style.justifyContent = 'center';
                previewDiv.style.backgroundColor = 'rgba(0,0,0,0.2)';
                previewDiv.style.borderRadius = '5px';
                previewDiv.style.overflow = 'hidden';

                try {
                    const blob = await idbKeyval.get(item.id);
                    if (blob) {
                        const url = URL.createObjectURL(blob);
                        const mime = getMimeType(item.targetExt);
                        
                        if (mime.startsWith('image/')) {
                            previewDiv.innerHTML = `<img src="${url}" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
                        } else if (mime.startsWith('video/')) {
                            previewDiv.innerHTML = `<video src="${url}" style="max-width: 100%; max-height: 100%; object-fit: contain;" controls preload="metadata"></video>`;
                        } else if (mime.startsWith('audio/')) {
                            previewDiv.innerHTML = `<audio src="${url}" style="width: 100%;" controls></audio>`;
                        } else {
                            previewDiv.innerHTML = `<span style="color: #999; font-size: 0.7rem;">No preview</span>`;
                        }
                    } else {
                        previewDiv.innerHTML = `<span style="color: #999; font-size: 0.7rem;">Expired</span>`;
                    }
                } catch (e) {
                    console.error("Preview load error", e);
                    previewDiv.innerHTML = `<span style="color: #999; font-size: 0.7rem;">Error</span>`;
                }

                const infoDiv = document.createElement('div');
                infoDiv.style.flex = '1';
                infoDiv.innerHTML = `
                    <div style="font-weight: bold; color: #ff0099;">${item.finalFileName}</div>
                    <div style="color: #ccc; font-size: 0.8rem;">From: ${item.originalName}</div>
                    <div style="color: #666; font-size: 0.7rem;">${date}</div>
                `;
                
                div.appendChild(previewDiv);
                div.appendChild(infoDiv);

                // Download button from history
                const dlBtn = document.createElement('a');
                dlBtn.href = '#';
                dlBtn.innerHTML = '&#11015;';
                dlBtn.style.textDecoration = 'none';
                dlBtn.style.fontSize = '1.5rem';
                dlBtn.style.color = '#00ff00';
                dlBtn.title = 'Download';
                dlBtn.onclick = async (e) => {
                    e.preventDefault();
                    const b = await idbKeyval.get(item.id);
                    if (b) {
                        const dlUrl = URL.createObjectURL(b);
                        const a = document.createElement('a');
                        a.href = dlUrl;
                        a.download = item.finalFileName;
                        a.click();
                        URL.revokeObjectURL(dlUrl);
                    } else {
                        alert('File data is no longer available locally.');
                    }
                };
                div.appendChild(dlBtn);

                historyList.appendChild(div);
            }
        };

        const addToHistory = async (originalName, targetExt, finalFileName, blob) => {
            const history = JSON.parse(localStorage.getItem('conversionHistory') || '[]');
            const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            
            history.push({
                id,
                originalName,
                targetExt,
                finalFileName,
                timestamp: new Date().toISOString()
            });
            
            // Keep only last 50 conversions
            if (history.length > 50) {
                const removed = history.shift();
                try { await idbKeyval.del(removed.id); } catch(e) {}
            }
            
            localStorage.setItem('conversionHistory', JSON.stringify(history));
            try { await idbKeyval.set(id, blob); } catch(e) { console.error('Failed to save to IDB', e); }
            
            loadHistory();
        };

        clearHistoryBtn.addEventListener('click', async () => {
            if (confirm('Clear all conversion history?')) {
                localStorage.removeItem('conversionHistory');
                try { await idbKeyval.clear(); } catch(e) {}
                loadHistory();
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) {
                previewContainer.style.display = 'none';
                return;
            }

            const url = URL.createObjectURL(file);
            previewContainer.style.display = 'block';
            previewBox.innerHTML = '';

            if (file.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = url;
                img.style.maxWidth = '100%';
                img.style.maxHeight = '300px';
                previewBox.appendChild(img);
            } else if (file.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = url;
                video.controls = true;
                video.style.maxWidth = '100%';
                video.style.maxHeight = '300px';
                previewBox.appendChild(video);
            } else if (file.type.startsWith('audio/')) {
                const audio = document.createElement('audio');
                audio.src = url;
                audio.controls = true;
                audio.style.width = '100%';
                previewBox.appendChild(audio);
            } else {
                previewBox.innerHTML = `<p>${file.name} (${(file.size / 1024).toFixed(1)} KB)</p>`;
            }
        });

        formatSelect.addEventListener('change', () => {
            if (formatSelect.value === 'other') {
                customFormatContainer.style.display = 'block';
            } else {
                customFormatContainer.style.display = 'none';
            }
        });

        async function load() {
            try {
                status.innerText = 'Loading FFmpeg core...';
                await ffmpeg.load();
                status.innerText = 'Ready to convert!';
                convertBtn.disabled = false;
                convertBtn.innerText = 'Convert File';
            } catch (err) {
                console.error(err);
                status.innerText = 'Error loading FFmpeg.';
            }
        }

        const convert = async () => {
            const files = fileInput.files;
            if (files.length === 0) return alert('Please select a file first!');
            
            let targetExt = formatSelect.value;
            if (targetExt === 'other') {
                targetExt = formatInput.value.trim().replace('.', '').toLowerCase();
            }
            
            if (!targetExt) return alert('Please select or enter a target format!');

            const file = files[0];
            const inputName = 'input_' + file.name;
            const outputName = 'output.' + targetExt;

            convertBtn.disabled = true;
            status.innerText = `Starting conversion to ${targetExt}...`;
            downloadLink.style.display = 'none';

            // Load file into memory
            ffmpeg.FS('writeFile', inputName, await fetchFile(file));
            
            // Run FFmpeg command
            try {
                await ffmpeg.run('-i', inputName, outputName);
                
                // Read result
                const data = ffmpeg.FS('readFile', outputName);
                const blob = new Blob([data.buffer], { type: getMimeType(targetExt) });
                const url = URL.createObjectURL(blob);
                
                downloadLink.href = url;
                const finalFileName = file.name.replace(/\.[^/.]+$/, "") + '.' + targetExt;
                downloadLink.download = finalFileName;
                downloadLink.innerText = 'Download ' + finalFileName;
                downloadLink.style.display = 'block';
                
                status.innerText = 'Conversion complete!';
                addToHistory(file.name, targetExt, finalFileName, blob);
            } catch (e) {
                console.error(e);
                status.innerText = 'Conversion failed. Check console for FFmpeg logs.';
            }
            
            convertBtn.disabled = false;
        };

        convertBtn.addEventListener('click', convert);
        loadHistory();
        load();
    </script>
</body>
</html>
