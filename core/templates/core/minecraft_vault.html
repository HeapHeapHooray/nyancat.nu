<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minagreste's Minecraft Vault - nyancat.nu</title>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'core/images/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'core/images/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'core/images/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'core/images/apple-touch-icon-bg.png' %}">
    <link rel="manifest" href="{% static 'core/site.webmanifest' %}">
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #003366;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        
        .vault-container {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .link-button {
            display: inline-block;
            background-color: #00cc66;
            color: white;
            font-weight: bold;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            font-size: 1.2rem;
            margin-top: 20px;
            border: 2px solid #00cc66;
        }
        
        .link-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 102, 0.4);
            background-color: #00dd77;
        }

        .back-link {
            margin-top: 30px;
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="vault-container">
        <h1>Minagreste's Minecraft Vault</h1>
        <p>Welcome to the historical archives of Minagreste's Minecraft adventures.</p>
        <a href="{% url 'minecraft_videos' %}" class="link-button">Minecraft Video Recordings</a>
    </div>
    <a href="{% url 'index' %}" class="back-link">← Back to Home</a>
</body>
</html>
